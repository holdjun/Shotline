default_steps = [
    "lens_correct",
    "raw_develop",
    "exposure_adjust",
    "denoise",
    "horizon",
    "white_balance",
    "color_grade",
    "auto_crop",
]

[output]
format = "jpg"
quality = 95
suffix = "_processed"

[models]
cache_dir = "~/.cache/shotline/models"

[processor_params.denoise]
# strength = 0.8

[processor_params.auto_crop]
# aspect_ratio = "3:2"

[processor_params.lens_correct]
# correct_distortion = true      # 几何畸变校正
# correct_vignetting = true      # 暗角（光照衰减）校正
# correct_tca = true             # 横向色差校正
# distance = 10.0                # 拍摄距离（米），影响暗角校正精度

[processor_params.raw_develop]
# ── Bayer 域参数（传给 _load_raw，省略则自适应选择）──
# demosaic_algorithm = "DHT"         # AHD, DHT, AAHD, DCB, PPG, VNG (LMMSE/AMAZE need GPL packs)
# highlight_mode = ...               # 省略=自适应(Bayer分析), "Clip"/"Blend"=强制
# fbdd_noise_reduction = ...         # 省略=自适应(噪声分析), "Off"/"Light"/"Full"=强制
# exp_preserve_highlights = 0.75     # 曝光补偿时的高光保护 (0-1)
# chromatic_aberration = [1.0, 1.0]  # [red_scale, blue_scale]
# noise_thr = null                   # 小波降噪阈值
# median_filter_passes = 0           # 中值滤波轮次
# ── 自适应阈值（可配置，用于 Bayer 分析）──
# saturation_threshold = 0.005       # 饱和率 >= 此值 → Blend（默认 0.5%）
# noise_low = 0.003                  # 噪声 < 此值 → FBDD Off
# noise_high = 0.008                 # 噪声 >= 此值 → FBDD Full; 之间 → Light
# ── 线性空间参数 ──
# auto_expose = true                 # log-average 自动曝光（校正到 18% gray）
# ev = 0.0                           # 手动 EV（叠加在 auto 之上）
# bright = 1.0                       # 亮度乘数
# ── Hable filmic 色调映射 ──
# white_point = 11.2                 # Hable 白点
# hable_A = 0.15                     # shoulder 强度
# hable_B = 0.50                     # 线性强度
# hable_C = 0.10                     # 线性角度
# hable_D = 0.20                     # toe 强度
# hable_E = 0.02                     # toe 分子
# hable_F = 0.30                     # toe 分母

[processor_params.exposure_adjust]
# JPG/HEIF 轻微 S-curve 调整（当前无可配置参数）
