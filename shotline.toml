default_steps = [
    "lens_correct",
    "raw_develop",
    "exposure_adjust",
    "denoise",
    "horizon",
    "white_balance",
    "color_grade",
    "auto_crop",
]

[output]
format = "jpg"
quality = 95
suffix = "_processed"

[models]
cache_dir = "~/.cache/shotline/models"

[processor_params.denoise]
# strength = 0.8

[processor_params.auto_crop]
# aspect_ratio = "3:2"

[processor_params.lens_correct]
# correct_distortion = true      # 几何畸变校正
# correct_vignetting = true      # 暗角（光照衰减）校正
# correct_tca = true             # 横向色差校正

[processor_params.raw_develop]
# ── Bayer 域参数（传给 _load_raw）──
# demosaic_algorithm = "DHT"         # AHD, DHT, AAHD, DCB, PPG, VNG (LMMSE/AMAZE need GPL packs)
# highlight_mode = "Blend"           # 默认 Blend（平滑高光恢复）; 可选 "Clip"/"Rebuild"
# fbdd_noise_reduction = "Off"       # 默认 Off（降噪交给 post-demosaic）; 可选 "Light"/"Full"
# ── 曝光 ──
# ev = 0.0                           # 手动 EV（叠加在 auto-EV 之上）
# auto_expose = true                 # 自动曝光；关闭则纯手动 ev
# 其余参数（Hable 色调映射、rawpy 透传等）见 docs/raw-loading.md，基本不需要调整

[processor_params.exposure_adjust]
# JPG/HEIF 轻微 S-curve 调整（当前无可配置参数）
